name: Publish

# release-please (on every push to main) keeps a "release" pull request open
# that accumulates the version bump and CHANGELOG. Merging that PR creates the
# git tag + GitHub Release, which then triggers the npm publish job below via
# OIDC trusted publishing (no npm token).
on:
  push:
    branches: [main]

permissions:
  contents: write # release-please: commits, tags, releases
  pull-requests: write # release-please: open the release PR
  id-token: write # npm OIDC trusted publishing

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release PR / tag
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run release-please
        uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: node
          include-component-in-tag: false # plain v<version> tags (e.g. v2.0.2)

  npm-publish:
    name: Publish to npm
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout (at release tag)
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (lint, test, bundle)
        run: |
          npm run lint
          npm run test
          npm run build

      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Publish to npm (trusted publishing / OIDC)
        run: npm publish --provenance --access public
