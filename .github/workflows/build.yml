name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: build, lint and test
        run: |
          npm ci
          npm run lint
          npm run test
          npm run build
      - name: Commit to public
        uses: EndBug/add-and-commit@v7
        with:
          add: 'build --force'
          message: 'Update build'
          push: 'origin HEAD:public --force'